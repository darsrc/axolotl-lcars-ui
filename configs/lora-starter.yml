# Starter Axolotl LoRA config. Edit in the LCARS structured editor or at /raw.
base_model: NousResearch/Llama-3.2-1B
model_type: AutoModelForCausalLM
tokenizer_type: AutoTokenizer

load_in_8bit: true
load_in_4bit: false
adapter: lora
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

datasets:
  - path: teknium/GPT4-LLM-Cleaned
    type: alpaca
dataset_prepared_path: last_run_prepared
val_set_size: 0.1

sequence_len: 2048
sample_packing: true
pad_to_sequence_len: true

output_dir: ./outputs/lora-out
micro_batch_size: 2
gradient_accumulation_steps: 4
num_epochs: 3
learning_rate: 0.0001
optimizer: adamw_bnb_8bit
lr_scheduler: cosine
warmup_steps: 10

bf16: auto
fp16: false
gradient_checkpointing: true
attn_implementation: flash_attention_2

logging_steps: 1
save_steps: 100
eval_steps: 100
strict: false
